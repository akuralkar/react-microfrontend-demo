name: Deploy microfrontend

on:
  push:
    branches:
      - main
  workflow-dispatch:
  
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            core-ui-remote-app/package-lock.json
            portal-ui-host-app/package-lock.json

      - name: Install & build remote core-ui-remote-app
        working-directory: core-ui-remote-app
        run: |
          npm ci
          npm run build
      
      - name: Install & build remote portal-ui-host-app
        working-directory: portal-ui-host-app
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p dist/host dist/remote
          cp -r core-ui-remote-app/dist/* dist/remote/
          cp -r portal-ui-host-app/dist/* dist/host/
          echo '<a href="./host/index.html">Host App</a>' > dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
