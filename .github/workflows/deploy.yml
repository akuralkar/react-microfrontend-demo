name: Deploy microfrontend
on:
  push:
    branches:
      - main
      workflow-dispatch:
      job:
      build:
        runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache:npm
          cache-dependency-path: |
          core-ui-remote-app/package-lock.json
          portal-ui-host-app/package-lock.json
      - name: install & build remote core-ui-remote-app
        working-directory: core-ui-remote-app
      - run: |
          npm ci
          npm run build
      
      - name: install & build remote portal-ui-host-app
        working-directory: portal-ui-host-app
      - run: |
          npm ci
          npm run build

  -name : Assemble site
  run : |
    mkdir -p dist/host dist/remote
    cp -r core-ui-remote-app/dist/* dist/remote/
    cp -r portal-ui-host-app/dist/* dist/host/
    echo '<a href="./host/index.html">Host App</a>' > dist/index.html

  - use : actions/upload-pages-artifact@v4
    with:
      path: dist



  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
      steps:
      - uses: actions/deploy-pages@v4
        id: deployment
